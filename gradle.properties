# Build runs on JDK 22 (platform 261 bytecode needs --release 21; JDK 21 not installed).
org.gradle.java.home=/Users/arash/Library/Java/JavaVirtualMachines/openjdk-22.0.2/Contents/Home
org.gradle.jvmargs=-Xmx2g -XX:+UseParallelGC
org.gradle.caching=true
org.gradle.configuration-cache=false

# Never try to auto-download a JDK toolchain (offline-friendly).
org.gradle.java.installations.auto-download=false

# Platform ships the Kotlin stdlib; don't bundle it into the plugin.
kotlin.stdlib.default.dependency=false
