name: Build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  checks: write # for the test-results check on PRs

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Test, verify & build
        # -Dorg.gradle.java.home overrides the machine-specific value in gradle.properties.
        # SENTRY_DSN is injected into sentry.properties at build time (see build.gradle.kts).
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        run: ./gradlew test verifyPluginProjectConfiguration verifyPluginStructure buildPlugin -Dorg.gradle.java.home="$JAVA_HOME" --stacktrace

      - name: Publish test report
        uses: dorny/test-reporter@v2
        if: always() # report even when tests fail
        with:
          name: Test results
          path: build/test-results/test/*.xml
          reporter: java-junit

      - name: Upload test results (JUnit XML)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: build/test-results/test/**
          if-no-files-found: warn

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ github.event.repository.name }}
          path: build/distributions/*.zip
          if-no-files-found: error
