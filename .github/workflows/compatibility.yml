name: Compatibility

# IntelliJ Plugin Verifier — binary-compatibility check against recommended IDE builds.
# Heavy (downloads IDEs), so run weekly and on demand rather than on every push.
on:
  workflow_dispatch:
  schedule:
    - cron: "0 5 * * 1" # weekly, Monday 05:00 UTC

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Run Plugin Verifier
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        run: ./gradlew verifyPlugin -Dorg.gradle.java.home="$JAVA_HOME" --stacktrace

      - name: Upload verifier report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: plugin-verifier-report
          path: build/reports/pluginVerifier/**
          if-no-files-found: warn
