name: Release

# Release a version deliberately — not on every push to main.
#  - Manual: provide a version (bumps VERSION, commits, tags v<version>).
#  - Or: push a tag v* to release the current VERSION.
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release, e.g. 0.2.0 (blank = use current VERSION)"
        required: false
        type: string
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      PUBLISH_TOKEN: ${{ secrets.PUBLISH_TOKEN }}
      SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Resolve version
        id: v
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          if [ -n "${INPUT_VERSION:-}" ]; then
            printf '%s\n' "$INPUT_VERSION" > VERSION
          fi
          VERSION="$(tr -d '[:space:]' < VERSION)"
          echo "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.]+)?$' \
            || { echo "Invalid version: '$VERSION'"; exit 1; }
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Commit bump & tag (manual runs)
        if: github.event_name == 'workflow_dispatch'
        env:
          VERSION: ${{ steps.v.outputs.version }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet VERSION; then
            git add VERSION
            git commit -m "release: v$VERSION"
            git push origin "HEAD:${GITHUB_REF_NAME}"
          fi
          if ! git rev-parse "v$VERSION" >/dev/null 2>&1; then
            git tag "v$VERSION"
            git push origin "v$VERSION"
          fi

      - name: Build plugin
        run: ./gradlew buildPlugin -Dorg.gradle.java.home="$JAVA_HOME" --stacktrace

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.v.outputs.version }}
          name: v${{ steps.v.outputs.version }}
          generate_release_notes: true
          files: build/distributions/*.zip

      - name: Publish to JetBrains Marketplace
        # Only when a publish token is configured; never fails the release if it can't publish
        # (e.g. before the first manual upload/approval).
        if: ${{ env.PUBLISH_TOKEN != '' }}
        continue-on-error: true
        run: ./gradlew publishPlugin -Dorg.gradle.java.home="$JAVA_HOME" --stacktrace
