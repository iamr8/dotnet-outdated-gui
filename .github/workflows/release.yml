name: Release

# Publishing happens from the `release` branch only. Merge a PR (with the VERSION bump in it)
# into `release`; if VERSION is higher than the last released tag, this tags, creates a GitHub
# release, and publishes to the JetBrains Marketplace. main only builds/verifies (see build.yml).
on:
  push:
    branches: [release]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      PUBLISH_TOKEN: ${{ secrets.PUBLISH_TOKEN }}
      SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Gate on version
        id: gate
        run: |
          set -euo pipefail
          VERSION="$(tr -d '[:space:]' < VERSION)"
          echo "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.]+)?$' \
            || { echo "::error::Invalid version '$VERSION' in VERSION file"; exit 1; }
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          LATEST="$(git tag -l 'v*' | sed 's/^v//' | sort -V | tail -n1 || true)"
          if [ -z "$LATEST" ]; then
            echo "No previous release tag — releasing $VERSION."
            echo "release=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          HIGHEST="$(printf '%s\n%s\n' "$VERSION" "$LATEST" | sort -V | tail -n1)"
          if [ "$VERSION" = "$LATEST" ] || [ "$HIGHEST" != "$VERSION" ]; then
            echo "::notice::VERSION $VERSION is not higher than last released v$LATEST — skipping release."
            echo "release=false" >> "$GITHUB_OUTPUT"
          else
            echo "Releasing $VERSION (previous v$LATEST)."
            echo "release=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up JDK 21
        if: steps.gate.outputs.release == 'true'
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        if: steps.gate.outputs.release == 'true'
        uses: gradle/actions/setup-gradle@v6

      - name: Build plugin
        if: steps.gate.outputs.release == 'true'
        run: ./gradlew buildPlugin -Dorg.gradle.java.home="$JAVA_HOME" --stacktrace

      - name: Tag
        if: steps.gate.outputs.release == 'true'
        env:
          VERSION: ${{ steps.gate.outputs.version }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if ! git rev-parse "v$VERSION" >/dev/null 2>&1; then
            git tag "v$VERSION"
            git push origin "v$VERSION"
          fi

      - name: Create GitHub release
        if: steps.gate.outputs.release == 'true'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.gate.outputs.version }}
          name: v${{ steps.gate.outputs.version }}
          generate_release_notes: true
          files: build/distributions/*.zip

      - name: Publish to JetBrains Marketplace
        # Requires PUBLISH_TOKEN (set after the first manual Marketplace upload + approval).
        if: steps.gate.outputs.release == 'true' && env.PUBLISH_TOKEN != ''
        continue-on-error: true
        run: ./gradlew publishPlugin -Dorg.gradle.java.home="$JAVA_HOME" --stacktrace
