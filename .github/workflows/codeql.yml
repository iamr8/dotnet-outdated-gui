name: CodeQL

on:
  push:
    branches: [main, release]
  pull_request:
    branches: [main, release]
  schedule:
    - cron: "0 6 * * 1" # weekly, Monday 06:00 UTC

env:
  JAVA_VERSION: "21"
  JAVA_DISTRIBUTION: temurin

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v5
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: java-kotlin
          build-mode: manual

      - name: Compile
        # clean + no-daemon + no-build-cache so real compilation happens and CodeQL can trace it
        # (a cached/up-to-date build produces "no source code seen").
        run: ./gradlew clean classes --no-daemon --no-build-cache -Dorg.gradle.java.home="$JAVA_HOME" --stacktrace

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:java-kotlin"
